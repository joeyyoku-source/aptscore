<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AptScore">
<title>AptScore</title>
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #242220;
    --border: #2e2c29;
    --accent: #c9a84c;
    --accent2: #e8c97a;
    --text: #f0ece4;
    --text2: #9a9590;
    --text3: #5a5650;
    --danger: #c0614a;
    --good: #6aab7e;
    --radius: 14px;
    --font-serif: 'Georgia', 'Times New Roman', serif;
    --font-sans: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ── HEADER ── */
  .header {
    padding: 56px 20px 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: var(--font-serif);
    font-size: 26px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 20px;
    background: var(--bg);
    position: sticky;
    top: 89px;
    z-index: 9;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 9px;
    border-radius: 8px;
    border: none;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--text3);
  }
  .tab.active {
    background: var(--accent);
    color: #0f0e0c;
  }

  /* ── CONTENT ── */
  .content { flex: 1; padding: 20px; padding-bottom: 100px; overflow-y: auto; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 13px 22px;
    border-radius: 10px;
    border: none;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #0f0e0c;
    width: 100%;
    font-size: 16px;
    padding: 16px;
    border-radius: var(--radius);
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    padding: 8px 14px;
    font-size: 14px;
  }
  .btn-danger {
    background: rgba(192,97,74,0.15);
    color: var(--danger);
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    border-radius: var(--radius);
    font-size: 15px;
  }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 20px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: #0f0e0c;
    box-shadow: 0 4px 24px rgba(201,168,76,0.4);
    transition: all 0.15s;
    z-index: 20;
  }
  .fab:active { transform: scale(0.92); }

  /* ── LEADERBOARD ── */
  .rank-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .rank-card:active { transform: scale(0.99); }
  .rank-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .rank-card.gold::before { background: #c9a84c; }
  .rank-card.silver::before { background: #a0a0a0; }
  .rank-card.bronze::before { background: #cd7f32; }
  .rank-card.other::before { background: var(--border); }

  .rank-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .rank-num {
    font-family: var(--font-serif);
    font-size: 28px;
    color: var(--text3);
    width: 32px;
    text-align: center;
    flex-shrink: 0;
  }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rank-meta {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }
  .rank-score {
    text-align: right;
    flex-shrink: 0;
  }
  .score-big {
    font-family: var(--font-serif);
    font-size: 26px;
    color: var(--accent);
  }
  .score-max {
    font-size: 11px;
    color: var(--text3);
  }
  .score-bar-wrap {
    margin-top: 10px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .score-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-family: var(--font-serif); font-size: 22px; color: var(--text2); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── SCORING FORM ── */
  .form-field {
    margin-bottom: 24px;
  }
  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    display: block;
  }
  .form-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 17px;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--accent); }

  .category-block {
    margin-bottom: 28px;
  }
  .category-title {
    font-family: var(--font-serif);
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 4px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .category-subtitle {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 12px;
    padding-bottom: 8px;
  }

  .feature-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .feature-row:last-child { border-bottom: none; }
  .feature-info { flex: 1; min-width: 0; }
  .feature-name {
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
  }
  .feature-weight {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }
  .feature-slider-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
    width: 130px;
  }
  .slider-val {
    font-family: var(--font-serif);
    font-size: 20px;
    color: var(--accent2);
    min-width: 24px;
    text-align: right;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
  }
  .slider-label {
    font-size: 10px;
    color: var(--text3);
    flex-shrink: 0;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(201,168,76,0.5);
  }
  input[type=range]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }

  /* ── DETAIL VIEW ── */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 20px;
  }
  .detail-score-hero {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px;
    text-align: center;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .hero-name {
    font-family: var(--font-serif);
    font-size: 24px;
    color: var(--text);
    margin-bottom: 12px;
  }
  .hero-score {
    font-family: var(--font-serif);
    font-size: 64px;
    color: var(--accent);
    line-height: 1;
  }
  .hero-score-label { font-size: 14px; color: var(--text3); margin-top: 4px; }
  
  .cat-summary {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .cat-summary-header {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .cat-summary-name {
    font-family: var(--font-serif);
    font-size: 16px;
    color: var(--text);
  }
  .cat-summary-score { font-size: 15px; color: var(--accent); font-weight: 500; }
  .cat-feature-list { padding: 0 16px 12px; border-top: 1px solid var(--border); display: none; }
  .cat-feature-list.open { display: block; }
  .cat-feature-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
  }
  .cat-feature-item:last-child { border-bottom: none; }
  .feature-score-dot {
    display: inline-flex;
    gap: 3px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.filled { background: var(--accent); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 50;
    display: none;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%;
    padding: 20px;
    padding-bottom: 40px;
    border: 1px solid var(--border);
    border-bottom: none;
  }
  .modal-title {
    font-family: var(--font-serif);
    font-size: 20px;
    margin-bottom: 16px;
    text-align: center;
    color: var(--text);
  }
</style>
</head>
<body>

<!-- LEADERBOARD SCREEN -->
<div class="screen active" id="screen-leaderboard">
  <div class="header">
    <div class="header-row">
      <div class="logo">Apt<span>Score</span></div>
      <div id="ldr-count" style="font-size:13px;color:var(--text3);"></div>
    </div>
  </div>
  <div class="content" id="leaderboard-list"></div>
  <button class="fab" onclick="showAddProperty()">+</button>
</div>

<!-- SCORE SCREEN -->
<div class="screen" id="screen-score">
  <div class="header">
    <div class="header-row">
      <button class="btn btn-ghost" onclick="cancelScore()">← Back</button>
      <div style="font-family:var(--font-serif);font-size:17px;color:var(--text2);" id="score-screen-title">New Property</div>
      <button class="btn btn-ghost" style="color:var(--accent);font-weight:600;" onclick="saveProperty()">Save</button>
    </div>
  </div>
  <div class="content" id="score-form"></div>
</div>

<!-- DETAIL SCREEN -->
<div class="screen" id="screen-detail">
  <div class="header">
    <div class="header-row">
      <button class="btn btn-ghost" onclick="showLeaderboard()">← Back</button>
      <div style="font-family:var(--font-serif);font-size:17px;color:var(--text2);">Details</div>
      <button class="btn btn-ghost" style="color:var(--accent);" onclick="editProperty()">Edit</button>
    </div>
  </div>
  <div class="content" id="detail-content"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const CATEGORIES = [
  { name: "Living Room", features: [
    { name: "Size", weight: 8 },
    { name: "Space for Desk", weight: 7 },
    { name: "Floor quality", weight: 6 },
    { name: "Ceiling Fan", weight: 8 },
    { name: "Outlets", weight: 9 },
  ]},
  { name: "Kitchen", features: [
    { name: "Counter Space", weight: 10 },
    { name: "Plugs", weight: 8 },
    { name: "Stove", weight: 6 },
    { name: "Dishwasher", weight: 8 },
    { name: "Fridge", weight: 6 },
    { name: "Cabinets/Shelves", weight: 7 },
    { name: "Pantry", weight: 7 },
  ]},
  { name: "Bedrooms", features: [
    { name: "Sizes", weight: 8 },
    { name: "Windows", weight: 5 },
    { name: "Closets", weight: 6 },
    { name: "Noise/Light", weight: 7 },
    { name: "Ceiling Light/Fan", weight: 5 },
  ]},
  { name: "Bathrooms", features: [
    { name: "Shower/Tub", weight: 7 },
    { name: "Outlets", weight: 7 },
    { name: "Linen Closet", weight: 5 },
    { name: "Cabinets", weight: 4 },
  ]},
  { name: "Patio", features: [
    { name: "Size", weight: 7 },
    { name: "View", weight: 7 },
  ]},
  { name: "Garage", features: [
    { name: "Attached", weight: 10 },
  ]},
  { name: "Floors & Walls", features: [
    { name: "Carpet", weight: 3 },
    { name: "Paint Allowed", weight: 2 },
  ]},
  { name: "Area", features: [
    { name: "Grocery Store Quality", weight: 8 },
    { name: "Grocery Store Distance", weight: 5 },
    { name: "Restaurants", weight: 2 },
    { name: "Road Quality", weight: 5 },
    { name: "Traffic", weight: 7 },
    { name: "Noise/Trains/Buses", weight: 9 },
    { name: "Cell Coverage", weight: 8 },
    { name: "NextLight/Internet Fiber", weight: 9 },
  ]},
  { name: "Dogs", features: [
    { name: "Dog Park Quality", weight: 9 },
    { name: "Cleanliness", weight: 8 },
    { name: "Nearby Walking Paths", weight: 7 },
    { name: "Pet Washing Station", weight: 1 },
  ]},
  { name: "Exterior", features: [
    { name: "Plants/Foliage", weight: 8 },
    { name: "Sun direction", weight: 6 },
    { name: "Walkways/Path Upkeep", weight: 7 },
    { name: "Building Upkeep", weight: 8 },
    { name: "Mailboxes", weight: 7 },
    { name: "Package Delivery", weight: 9 },
    { name: "Nearby Walking/Parks", weight: 7 },
    { name: "Crime/Police", weight: 10 },
    { name: "Library/City Facilities", weight: 6 },
  ]},
  { name: "Amenities", features: [
    { name: "Clubhouse", weight: 2 },
    { name: "Gym", weight: 8 },
    { name: "Pool Area", weight: 1 },
    { name: "Hot Tub/Sauna", weight: 1 },
    { name: "In Unit Laundry", weight: 9 },
  ]},
];

// Compute max possible score (categories only, rent scored separately)
const MAX_SCORE = CATEGORIES.reduce((sum, cat) =>
  sum + cat.features.reduce((s, f) => s + f.weight * 5, 0), 0);

// Rent scoring: $1900 = 10pts, every $100 below adds 1 (max 12 at $1700), every $100 above subtracts 1
const RENT_MAX_POINTS = 12;
function rentScore(rent) {
  const steps = (rent - 1900) / 100;
  const score = 10 - steps;
  return Math.min(RENT_MAX_POINTS, Math.max(0, score));
}
// Max rent contribution to total score
const RENT_MAX_SCORE = RENT_MAX_POINTS;

// ── STORAGE ──
function loadProperties() {
  try { return JSON.parse(localStorage.getItem('aptscore_props') || '[]'); }
  catch(e) { return []; }
}
function saveProperties(props) {
  localStorage.setItem('aptscore_props', JSON.stringify(props));
}

// ── SCORING ──
function calcScore(scores, rent) {
  let total = 0;
  CATEGORIES.forEach((cat, ci) => {
    cat.features.forEach((f, fi) => {
      const key = `${ci}_${fi}`;
      const val = scores[key] || 0;
      total += val * f.weight;
    });
  });
  if (rent) total += rentScore(rent);
  return total;
}

function calcPercent(scores, rent) {
  return Math.round((calcScore(scores, rent) / (MAX_SCORE + RENT_MAX_SCORE)) * 100);
}

// ── STATE ──
let currentPropertyId = null;
let editMode = false;

// ── LEADERBOARD ──
function showLeaderboard() {
  setScreen('leaderboard');
  renderLeaderboard();
}

function renderLeaderboard() {
  const props = loadProperties();
  const el = document.getElementById('leaderboard-list');
  const countEl = document.getElementById('ldr-count');
  
  if (props.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🏠</div>
      <h3>No properties yet</h3>
      <p>Tap the + button to score your first apartment visit.</p>
    </div>`;
    countEl.textContent = '';
    return;
  }

  const sorted = [...props].sort((a, b) => calcScore(b.scores, b.rent) - calcScore(a.scores, a.rent));
  countEl.textContent = `${props.length} visited`;

  el.innerHTML = sorted.map((p, i) => {
    const pct = calcPercent(p.scores, p.rent);
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'other';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
    const date = p.date ? new Date(p.date).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '';
    const rentLabel = p.rent ? `$${p.rent.toLocaleString()}/mo · ` : '';
    return `
    <div class="rank-card ${rankClass}" onclick="showDetail('${p.id}')">
      <div class="rank-row">
        <div class="rank-num">${medal || (i+1)}</div>
        <div class="rank-info">
          <div class="rank-name">${p.name}</div>
          <div class="rank-meta">${rentLabel}${date}</div>
        </div>
        <div class="rank-score">
          <div class="score-big">${pct}<span style="font-size:16px;color:var(--text3)">%</span></div>
          <div class="score-max">weighted match</div>
        </div>
      </div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

// ── ADD / EDIT PROPERTY ──
function showAddProperty() {
  editMode = false;
  currentPropertyId = null;
  document.getElementById('score-screen-title').textContent = 'New Property';
  renderScoreForm({});
  setScreen('score');
}

function editProperty() {
  const props = loadProperties();
  const prop = props.find(p => p.id === currentPropertyId);
  if (!prop) return;
  editMode = true;
  document.getElementById('score-screen-title').textContent = 'Edit Property';
  renderScoreForm(prop.scores, prop.name, prop.rent);
  setScreen('score');
}

function renderScoreForm(existingScores, existingName, existingRent) {
  const form = document.getElementById('score-form');
  const rent = existingRent || 1900;
  const rentPoints = rentScore(rent);
  let html = `<div class="form-field">
    <label class="form-label">Property Name or Address</label>
    <input class="form-input" type="text" id="prop-name" placeholder="e.g. The Maple on 3rd, #204" value="${existingName || ''}" autocomplete="off">
  </div>
  <div class="form-field">
    <label class="form-label">Monthly Rent</label>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
        <div id="rent-display" style="font-size:22px;font-weight:600;color:var(--accent);">$${rent.toLocaleString()}/mo</div>
        <div id="rent-score-display" style="font-size:12px;color:var(--text3);">Score: ${rentPoints.toFixed(1)} / 12 &nbsp;·&nbsp; Target: $1,900</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
        <span style="font-size:11px;color:var(--text3);flex-shrink:0;">$1,700</span>
        <input type="range" min="1700" max="2900" step="100" value="${rent}" id="rent-slider"
          oninput="updateRentDisplay(this.value)" style="flex:1;">
        <span style="font-size:11px;color:var(--text3);flex-shrink:0;">$2,900</span>
      </div>
    </div>
  </div>`;

  CATEGORIES.forEach((cat, ci) => {
    html += `<div class="category-block">
      <div class="category-title">${cat.name}</div>
      <div class="category-subtitle">Swipe sliders to score each feature 1–5</div>`;
    cat.features.forEach((f, fi) => {
      const key = `${ci}_${fi}`;
      const val = existingScores[key] !== undefined ? existingScores[key] : 3;
      html += `
      <div class="feature-row">
        <div class="feature-info">
          <div class="feature-name">${f.name}</div>
          <div class="feature-weight">Importance: ${f.weight}/10</div>
        </div>
        <div class="feature-slider-wrap">
          <div class="slider-val" id="sv_${key}">${val}</div>
          <div class="slider-row">
            <span class="slider-label">1</span>
            <input type="range" min="1" max="5" step="1" value="${val}" 
              oninput="document.getElementById('sv_${key}').textContent=this.value"
              data-key="${key}">
            <span class="slider-label">5</span>
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  html += `<button class="btn btn-primary" onclick="saveProperty()">Save Property</button>`;
  if (editMode) {
    html += `<button class="btn btn-danger" onclick="deleteProperty()">Delete This Property</button>`;
  }
  form.innerHTML = html;
  form.scrollTop = 0;
}

function updateRentDisplay(val) {
  const rent = parseInt(val);
  const pts = rentScore(rent);
  document.getElementById('rent-display').textContent = `$${rent.toLocaleString()}/mo`;
  document.getElementById('rent-score-display').textContent = `Score: ${pts.toFixed(1)} / 12 pts · Target: $1,900`;
}

function saveProperty() {
  const nameEl = document.getElementById('prop-name');
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) { showToast('Please enter a property name'); nameEl.focus(); return; }

  const rentEl = document.getElementById('rent-slider');
  const rent = rentEl ? parseInt(rentEl.value) : 1900;

  const scores = {};
  document.querySelectorAll('input[type=range][data-key]').forEach(el => {
    scores[el.dataset.key] = parseInt(el.value);
  });

  const props = loadProperties();
  if (editMode && currentPropertyId) {
    const idx = props.findIndex(p => p.id === currentPropertyId);
    if (idx >= 0) { props[idx].name = name; props[idx].scores = scores; props[idx].rent = rent; }
  } else {
    props.push({ id: Date.now().toString(), name, scores, rent, date: new Date().toISOString() });
  }
  saveProperties(props);
  showToast(editMode ? 'Property updated!' : 'Property saved!');
  setTimeout(() => showLeaderboard(), 400);
}

function cancelScore() {
  showLeaderboard();
}

function deleteProperty() {
  if (!confirm('Delete this property?')) return;
  const props = loadProperties().filter(p => p.id !== currentPropertyId);
  saveProperties(props);
  showToast('Property deleted');
  setTimeout(() => showLeaderboard(), 400);
}

// ── DETAIL ──
function showDetail(id) {
  currentPropertyId = id;
  const props = loadProperties();
  const prop = props.find(p => p.id === id);
  if (!prop) return;

  const pct = calcPercent(prop.scores, prop.rent);
  const date = prop.date ? new Date(prop.date).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}) : '';
  const rentPts = prop.rent ? rentScore(prop.rent) : null;

  let html = `
    <div class="detail-score-hero">
      <div class="hero-name">${prop.name}</div>
      <div class="hero-score">${pct}<span style="font-size:28px;color:var(--text3)">%</span></div>
      <div class="hero-score-label">weighted match · visited ${date}</div>
      ${prop.rent ? `<div style="margin-top:10px;font-size:14px;color:var(--accent);">$${prop.rent.toLocaleString()}/mo &nbsp;·&nbsp; Rent score: ${rentPts.toFixed(1)}/12</div>` : ''}
    </div>`;

  CATEGORIES.forEach((cat, ci) => {
    let catScore = 0, catMax = 0;
    cat.features.forEach((f, fi) => {
      const val = prop.scores[`${ci}_${fi}`] || 0;
      catScore += val * f.weight;
      catMax += 5 * f.weight;
    });
    const catPct = Math.round((catScore / catMax) * 100);

    html += `<div class="cat-summary">
      <div class="cat-summary-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div class="cat-summary-name">${cat.name}</div>
        <div class="cat-summary-score">${catPct}%</div>
      </div>
      <div class="cat-feature-list">`;
    cat.features.forEach((f, fi) => {
      const val = prop.scores[`${ci}_${fi}`] || 0;
      const dots = Array.from({length:5}, (_,i) =>
        `<span class="dot${i < val ? ' filled' : ''}"></span>`).join('');
      html += `<div class="cat-feature-item">
        <span>${f.name}</span>
        <span class="feature-score-dot">${dots}</span>
      </div>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('detail-content').innerHTML = html;
  setScreen('detail');
}

// ── UTILS ──
function setScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  window.scrollTo(0,0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
renderLeaderboard();
</script>
</body>
</html>
